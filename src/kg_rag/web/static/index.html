<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph RAG</title>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #e4e6eb;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 24px;
      border-bottom: 1px solid #1f232b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      gap: 16px;
    }
    header h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.4px;
      color: #c9cdd6;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: #161a22;
      border-radius: 8px;
      padding: 3px;
    }
    .tab {
      background: transparent;
      color: #8b94a3;
      border: none;
      padding: 6px 14px;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .tab:hover { color: #e4e6eb; }
    .tab.active { background: #2a3142; color: #e4e6eb; }
    #status {
      font-size: 12px;
      color: #8b94a3;
      font-variant-numeric: tabular-nums;
    }
    main {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    aside {
      width: 300px;
      border-right: 1px solid #1f232b;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex-shrink: 0;
    }
    #drop-area {
      flex-shrink: 0;
      height: 200px;
      border: 2px dashed #2a2f3a;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #6b7382;
      font-size: 13px;
      line-height: 1.5;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
    }
    #drop-area:hover { border-color: #3a4252; color: #8b94a3; }
    #drop-area.over { border-color: #4a90e2; color: #e4e6eb; background: #131720; }
    #drop-area.busy { border-color: #c9a227; color: #c9a227; cursor: wait; }
    #drop-area .hint { font-size: 11px; color: #4a5160; margin-top: 8px; }
    .file-list {
      list-style: none;
      font-size: 12px;
      color: #8b94a3;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    .file-list li {
      padding: 8px 0;
      border-top: 1px solid #1f232b;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .file-list li:first-child { border-top: none; }
    .file-list .ok { color: #4ea860; flex-shrink: 0; }
    .file-list .err { color: #e25c5c; flex-shrink: 0; }
    .file-list .name { word-break: break-all; }
    .file-list .meta { color: #4a5160; font-size: 11px; }

    .view {
      flex: 1;
      min-width: 0;
      display: none;
    }
    .view.active { display: flex; }

    #graph {
      flex: 1;
      background: #0f1115;
      min-width: 0;
    }
    #graph-empty {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a5160;
      font-size: 13px;
    }

    #chat {
      flex-direction: column;
      background: #0f1115;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #chat-empty {
      margin: auto;
      color: #4a5160;
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
    }
    #chat-empty .examples {
      margin-top: 16px;
      font-size: 12px;
      color: #3a4252;
    }
    .msg {
      max-width: 720px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #2a3142;
      color: #e4e6eb;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #161a22;
      color: #c9cdd6;
      border: 1px solid #1f232b;
      border-bottom-left-radius: 4px;
    }
    .msg.assistant.error {
      border-color: #4a2027;
      color: #e25c5c;
    }
    .msg.assistant.pending { color: #6b7382; font-style: italic; }
    .msg-meta {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1f232b;
      font-size: 11px;
      color: #4a5160;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .msg-meta .chip {
      background: #0f1115;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #1f232b;
    }

    #chat-input-wrap {
      border-top: 1px solid #1f232b;
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      background: #161a22;
      border: 1px solid #1f232b;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e4e6eb;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }
    #chat-input:focus { border-color: #4a90e2; }
    #chat-input:disabled { opacity: 0.6; cursor: not-allowed; }
    #chat-send {
      background: #4a90e2;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
      height: 42px;
      transition: background 0.15s, opacity 0.15s;
    }
    #chat-send:hover:not(:disabled) { background: #5a9ce8; }
    #chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Graph RAG · Knowledge Graph</h1>
    <div class="tabs" role="tablist">
      <button class="tab active" id="tab-graph" data-view="graph" role="tab">Graph</button>
      <button class="tab" id="tab-chat" data-view="chat" role="tab">Chat</button>
    </div>
    <span id="status">bereit</span>
  </header>
  <main>
    <aside>
      <div id="drop-area">
        <div>PDF hierhin ziehen</div>
        <div class="hint">oder klicken zum Auswählen</div>
      </div>
      <input type="file" id="file-input" accept="application/pdf" hidden />
      <ul class="file-list" id="files"></ul>
    </aside>
    <section id="view-graph" class="view active">
      <div id="graph">
        <div id="graph-empty">noch keine Entitäten</div>
      </div>
    </section>
    <section id="view-chat" class="view">
      <div id="chat" style="display:flex; flex:1; flex-direction:column; min-width:0;">
        <div id="chat-messages">
          <div id="chat-empty">
            Stelle eine Frage zu den indexierten PDFs.
            <div class="examples">z. B. „Welche Technologien werden im Dokument erwähnt?"</div>
          </div>
        </div>
        <div id="chat-input-wrap">
          <textarea
            id="chat-input"
            rows="1"
            placeholder="Frage stellen … (Enter zum Senden, Shift+Enter für Zeilenumbruch)"
          ></textarea>
          <button id="chat-send" type="button">Senden</button>
        </div>
      </div>
    </section>
  </main>
  <script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const statusEl = document.getElementById('status');
    const filesEl = document.getElementById('files');
    const graphEl = document.getElementById('graph');
    const emptyEl = document.getElementById('graph-empty');
    const tabs = document.querySelectorAll('.tab');
    const views = {
      graph: document.getElementById('view-graph'),
      chat: document.getElementById('view-chat'),
    };
    const chatMessages = document.getElementById('chat-messages');
    const chatEmpty = document.getElementById('chat-empty');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');

    let network = null;
    let chatBusy = false;

    function setStatus(text, kind) {
      statusEl.textContent = text;
      statusEl.style.color = kind === 'error' ? '#e25c5c'
        : kind === 'busy' ? '#c9a227'
        : '#8b94a3';
    }

    function switchView(name) {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.view === name));
      Object.entries(views).forEach(([key, el]) => {
        el.classList.toggle('active', key === name);
      });
      if (name === 'chat') {
        chatInput.focus();
      }
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => switchView(tab.dataset.view));
    });

    function addFileEntry(name, meta, ok) {
      const li = document.createElement('li');
      const mark = document.createElement('span');
      mark.className = ok ? 'ok' : 'err';
      mark.textContent = ok ? '✓' : '✕';
      const nameEl = document.createElement('span');
      nameEl.className = 'name';
      nameEl.textContent = name;
      const metaEl = document.createElement('span');
      metaEl.className = 'meta';
      metaEl.textContent = meta;
      li.append(mark, nameEl, metaEl);
      filesEl.prepend(li);
    }

    function renderGraph(data) {
      const nodes = (data.nodes || []).map(n => ({
        id: n.id,
        label: n.label,
        title: n.description ? `${n.type} — ${n.description}` : n.type,
      }));
      const edges = (data.edges || []).map(e => ({
        from: e.source,
        to: e.target,
        label: e.relation,
      }));

      if (nodes.length === 0) {
        if (network) { network.destroy(); network = null; }
        emptyEl.style.display = 'flex';
        return;
      }
      emptyEl.style.display = 'none';

      const visData = {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges),
      };
      const options = {
        interaction: { hover: true, tooltipDelay: 100 },
        physics: {
          solver: 'forceAtlas2Based',
          forceAtlas2Based: { gravitationalConstant: -45, springLength: 110 },
          stabilization: { iterations: 250 },
        },
        nodes: {
          shape: 'dot',
          size: 14,
          borderWidth: 1,
          color: {
            background: '#1a2030',
            border: '#4a90e2',
            highlight: { background: '#243049', border: '#6fa8e8' },
          },
          font: { color: '#e4e6eb', size: 13, face: 'sans-serif' },
        },
        edges: {
          arrows: { to: { enabled: true, scaleFactor: 0.5 } },
          color: { color: '#3a4252', highlight: '#6fa8e8' },
          font: { color: '#6b7382', size: 10, strokeWidth: 0, align: 'middle' },
          smooth: { type: 'continuous' },
          width: 1,
        },
      };
      if (network) network.destroy();
      network = new vis.Network(graphEl, visData, options);
    }

    function graphSummary(data) {
      const n = (data.nodes || []).length;
      const e = (data.edges || []).length;
      return `${n} Entität${n === 1 ? '' : 'en'} · ${e} Relation${e === 1 ? '' : 'en'}`;
    }

    async function loadGraph() {
      try {
        const res = await fetch('/api/graph');
        const data = await res.json();
        if (!res.ok) {
          setStatus(`Fehler: ${data.detail || res.statusText}`, 'error');
          return;
        }
        renderGraph(data);
        setStatus(graphSummary(data));
      } catch (err) {
        setStatus(`Fehler: ${err.message}`, 'error');
      }
    }

    async function upload(file) {
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        setStatus('Nur PDF-Dateien erlaubt', 'error');
        return;
      }
      const fd = new FormData();
      fd.append('file', file);
      dropArea.classList.add('busy');
      setStatus(`Indexiere ${file.name} …`, 'busy');
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) {
          addFileEntry(file.name, data.detail || res.statusText, false);
          setStatus(`Fehler: ${data.detail || res.statusText}`, 'error');
          return;
        }
        addFileEntry(data.filename, `${data.chunks_indexed} Chunks`, true);
        renderGraph(data.graph);
        setStatus(graphSummary(data.graph));
      } catch (err) {
        addFileEntry(file.name, err.message, false);
        setStatus(`Fehler: ${err.message}`, 'error');
      } finally {
        dropArea.classList.remove('busy');
      }
    }

    function appendMessage(role, text, options = {}) {
      if (chatEmpty && chatEmpty.parentNode) chatEmpty.remove();
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;
      if (options.error) msg.classList.add('error');
      if (options.pending) msg.classList.add('pending');
      msg.textContent = text;
      if (options.meta) {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        options.meta.forEach(([label, value]) => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = `${label}: ${value}`;
          meta.appendChild(chip);
        });
        msg.appendChild(meta);
      }
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return msg;
    }

    function setChatBusy(busy) {
      chatBusy = busy;
      chatInput.disabled = busy;
      chatSend.disabled = busy;
    }

    async function sendChatMessage() {
      const question = chatInput.value.trim();
      if (!question || chatBusy) return;

      appendMessage('user', question);
      chatInput.value = '';
      chatInput.style.height = 'auto';
      setChatBusy(true);
      setStatus('Frage wird verarbeitet …', 'busy');
      const pending = appendMessage('assistant', 'denke nach …', { pending: true });

      try {
        const res = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        pending.remove();
        if (!res.ok) {
          appendMessage('assistant', data.detail || res.statusText, { error: true });
          setStatus(`Fehler: ${data.detail || res.statusText}`, 'error');
          return;
        }
        const meta = [];
        if (typeof data.vector_chunks === 'number') {
          meta.push(['Vector-Chunks', data.vector_chunks]);
        }
        if (typeof data.graph_chunks === 'number') {
          meta.push(['Graph-Chunks', data.graph_chunks]);
        }
        if (Array.isArray(data.query_entities) && data.query_entities.length) {
          meta.push(['Entitäten', data.query_entities.join(', ')]);
        }
        appendMessage('assistant', data.answer || '(leere Antwort)', { meta });
        setStatus('Antwort geliefert');
      } catch (err) {
        pending.remove();
        appendMessage('assistant', err.message, { error: true });
        setStatus(`Fehler: ${err.message}`, 'error');
      } finally {
        setChatBusy(false);
        chatInput.focus();
      }
    }

    chatSend.addEventListener('click', sendChatMessage);
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChatMessage();
      }
    });
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + 'px';
    });

    dropArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      const f = e.target.files[0];
      if (f) upload(f);
      fileInput.value = '';
    });

    ['dragenter', 'dragover'].forEach(evt => {
      dropArea.addEventListener(evt, e => {
        e.preventDefault();
        e.stopPropagation();
        dropArea.classList.add('over');
      });
    });
    ['dragleave', 'drop'].forEach(evt => {
      dropArea.addEventListener(evt, e => {
        e.preventDefault();
        e.stopPropagation();
        dropArea.classList.remove('over');
      });
    });
    dropArea.addEventListener('drop', e => {
      const f = e.dataTransfer.files[0];
      if (f) upload(f);
    });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => e.preventDefault());

    loadGraph();
  </script>
</body>
</html>
